<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Stats Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:#262927;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: linear-gradient(180deg, #2DE2D5 0%, #30E5D8 50%, #2DE2D5 100%);
    position: relative;
    overflow: hidden;
    border-radius: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  /* Profile Card */
  .profile-card {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    width: 320px;
    background: rgb(60, 179, 113);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px 20px 20px;
    text-align: center;
    z-index: 10;
    opacity: 1;
    transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    animation: cardSlideIn 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  @keyframes cardSlideIn {
    from { transform: translateX(-50%) translateY(-80px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  .profile-card.slide-out {
    transform: translateX(-50%) translateY(-80px);
    opacity: 0;
  }

  .profile-card.slide-in {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .avatar-wrapper {
    width: 80px;
    height: 80px;
    margin: 0 auto 10px;
    position: relative;
  }

  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: white;
    font-weight: bold;
    border: 3px solid #333;
    overflow: hidden;
  }

  .verified-badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 24px;
    height: 24px;
    background: #20D5EC;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    border: 2px solid #1a1a2e;
  }

  .username {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 18px;
  }

  .stats-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  .stat-item {
    text-align: center;
    flex: 1;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #20D5EC;
    line-height: 1.2;
    min-width: 70px;
  }

  .stat-value.followers {
    color: #fff;
    font-size: 26px;
  }

  .stat-label {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
    text-transform: capitalize;
  }

  /* Floating Avatar - positioned by JS */
  .floating-avatar {
    position: absolute;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: white;
    font-weight: bold;
    z-index: 5;
    border: 3px solid rgba(255,255,255,0.3);
    pointer-events: none;
    will-change: transform;
    box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
    overflow: hidden;
  }

  /* White dot — hidden by default, appears on contact */
  .dot-trail {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: white;
    z-index: 4;
    pointer-events: none;
    will-change: transform, opacity;
    box-shadow: 0 0 14px rgba(255,255,255,0.95), 0 0 30px rgba(255,255,255,0.5);
    opacity: 0;
    transition: opacity 0.08s;
  }

  /* Emoji reaction */
  .emoji-reaction {
    position: absolute;
    top: 290px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
    z-index: 10;
    display: none;
  }

  @keyframes emojiPop {
    0% { transform: translateX(-50%) scale(0); opacity: 0; }
    50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
    100% { transform: translateX(-50%) scale(1); opacity: 1; }
  }

  @keyframes emojiPopOut {
    0% { transform: translateX(-50%) scale(1); opacity: 1; }
    50% { transform: translateX(-50%) scale(1.3); opacity: 0.5; }
    100% { transform: translateX(-50%) scale(0); opacity: 0; }
  }

  /* Neon X - drawn on canvas */
  .neon-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
  }

  /* Profile transition — handled via slide-out / slide-in classes + CSS transition */

  /* Impact flash */
  .impact-flash {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(130,210,255,0.6) 40%, rgba(80,170,255,0.2) 65%, transparent 80%);
    pointer-events: none;
    z-index: 6;
    opacity: 0;
    will-change: transform, opacity;
  }
</style>

  <div class="impact-flash" id="impactFlash"></div>
</div>

<script>
  // ===== FRAME DIMENSIONS =====
  const W = 390, H = 844;
  const cx = W / 2;
  const cy = 560;

  // ===== TRIANGULAR CHEVRON BARRIERS =====
  // Each chevron is a V-shape polyline: top -> apex -> bottom
  // Left ">" points right, Right "<" points left
  const chevrons = [
    { // Left ">" — triangular V pointing right
      points: [
        { x: -15, y: cy - 210 },    // top-left (offscreen)
        { x: cx - 55, y: cy },       // apex (inward point)
        { x: -15, y: cy + 210 }      // bottom-left (offscreen)
      ]
    },
    { // Right "<" — triangular V pointing left
      points: [
        { x: W + 15, y: cy - 210 },  // top-right (offscreen)
        { x: cx + 55, y: cy },        // apex (inward point)
        { x: W + 15, y: cy + 210 }    // bottom-right (offscreen)
      ]
    }
  ];

  // Segments for collision detection (same format as before)
  const chevronSegments = [];
  chevrons.forEach(c => chevronSegments.push(c.points));

  // ===== CANVAS =====
  const canvas = document.getElementById('neonCanvas');
  const ctx2d = canvas.getContext('2d');
  let glowPhase = 0;

  // Per-chevron hit state
  const chevronHit = [0, 0];
  const chevronImpactX = [0, 0];
  const chevronImpactY = [0, 0];

  function drawChevronPath(c) {
    ctx2d.beginPath();
    ctx2d.moveTo(c.points[0].x, c.points[0].y);
    ctx2d.lineTo(c.points[1].x, c.points[1].y);
    ctx2d.lineTo(c.points[2].x, c.points[2].y);
  }

  function drawNeonX() {
    ctx2d.clearRect(0, 0, W, H);
    glowPhase += 0.025;
    const pulse = 0.7 + 0.3 * Math.sin(glowPhase);

    chevrons.forEach((c, i) => {
      chevronHit[i] *= 0.88;
      const hit = chevronHit[i];
      const hit2 = hit * hit;

      // Layer 1: Wide outer glow — always visible, never fades
      drawChevronPath(c);
      ctx2d.strokeStyle = `rgba(80, 170, 255, ${0.5 + hit2 * 0.5})`;
      ctx2d.lineWidth = 40 + hit2 * 35;
      ctx2d.lineCap = 'round';
      ctx2d.lineJoin = 'round';
      ctx2d.stroke();

      // Layer 2: Mid glow — always visible
      drawChevronPath(c);
      ctx2d.strokeStyle = `rgba(90, 190, 255, ${0.7 + hit2 * 0.3})`;
      ctx2d.lineWidth = 26 + hit2 * 20;
      ctx2d.lineCap = 'round';
      ctx2d.lineJoin = 'round';
      ctx2d.stroke();

      // Layer 3: Bright core — fully opaque always
      drawChevronPath(c);
      const coreR = Math.round(120 + hit * 135);
      const coreG = Math.round(200 + hit * 55);
      ctx2d.strokeStyle = `rgba(${coreR}, ${coreG}, 255, 1)`;
      ctx2d.lineWidth = 12 + hit2 * 8;
      ctx2d.lineCap = 'round';
      ctx2d.lineJoin = 'round';
      ctx2d.stroke();

      // Layer 4: White-hot center — fully opaque always
      drawChevronPath(c);
      ctx2d.strokeStyle = `rgba(240, 250, 255, ${0.85 + hit * 0.15})`;
      ctx2d.lineWidth = 5 + hit2 * 5;
      ctx2d.lineCap = 'round';
      ctx2d.lineJoin = 'round';
      ctx2d.stroke();

      // Layer 5: Shockwave burst at impact point
      if (hit > 0.05) {
        const ix = chevronImpactX[i];
        const iy = chevronImpactY[i];
        const burstRadius = 20 + (1 - hit) * 60;
        const burstAlpha = hit2 * 0.9;
        ctx2d.beginPath();
        ctx2d.arc(ix, iy, burstRadius, 0, Math.PI * 2);
        ctx2d.fillStyle = `rgba(180, 230, 255, ${burstAlpha})`;
        ctx2d.fill();
        ctx2d.beginPath();
        ctx2d.arc(ix, iy, burstRadius * 1.5, 0, Math.PI * 2);
        ctx2d.strokeStyle = `rgba(100, 200, 255, ${burstAlpha * 0.5})`;
        ctx2d.lineWidth = 3;
        ctx2d.stroke();
      }
    });
  }

  // ===== PHYSICS =====
  const ballRadius = 28;
  const GRAVITY = 0.18;            // normal weight — ball feels heavy
  const REPULSE_FORCE = 3.5;
  const COLLISION_DIST = ballRadius + 16;

  // Home zone — ball starts here but isn't stuck here
  const homeY = cy - 80;

  let ballX = cx, ballY = homeY;
  let ballVX = 0, ballVY = 0;
  // Smoothed display position (interpolated for smoother rendering)
  let displayX = ballX, displayY = ballY;
  let dotOpacity = 0;

  let turbulenceSpeed = 0;
  let driftX = 0, driftY = 0;
  let frameCount = 0;
  let dropTimer = 0, dropping = false, dropDuration = 0, sceneTime = 0;
  let dropStyle = 0, dropSeed = 0, dropGravMult = 3, dropDrift = 0;

  let noiseSeed = Math.random() * 1000;
  function noise(t) {
    return Math.sin(t * 1.17 + noiseSeed) * 0.5
         + Math.sin(t * 2.31 + noiseSeed * 1.7) * 0.3
         + Math.sin(t * 4.57 + noiseSeed * 0.3) * 0.2;
  }

  function resetBallToCenter() {
    ballX = cx;
    ballY = homeY;
    displayX = cx;
    displayY = homeY;
    noiseSeed = Math.random() * 10000;
    // Launch toward one of the barriers — ball should immediately head to a wall
    const side = Math.random() < 0.5 ? -1 : 1;
    const launchSpeed = 3.5 + Math.random() * 2.5;
    ballVX = side * launchSpeed;
    ballVY = (Math.random() - 0.3) * 2.0; // slight downward bias
    turbulenceSpeed = 0.004 + Math.random() * 0.012;
    driftX = (Math.random() - 0.5) * 0.015;
    driftY = (Math.random() - 0.5) * 0.01;
    dropTimer = 120 + Math.floor(Math.random() * 180);
    dropping = false;
    sceneTime = 0;
    frameCount = 0;
    dotOpacity = 0;
    for (let i = 0; i < chevronHit.length; i++) chevronHit[i] = 0;
  }
  resetBallToCenter();

  const floatingAvatar = document.getElementById('floatingAvatar');
  const dotTrail = document.getElementById('dotTrail');
  const impactFlash = document.getElementById('impactFlash');

  // Find closest point on sampled curve segments to ball
  function closestOnCurve(pts, px, py) {
    let bestDist = Infinity, bestX = 0, bestY = 0, bestNx = 0, bestNy = 0;
    for (let j = 0; j < pts.length - 1; j++) {
      const ax = pts[j].x, ay = pts[j].y;
      const bx = pts[j + 1].x, by = pts[j + 1].y;
      const dx = bx - ax, dy = by - ay;
      const lenSq = dx * dx + dy * dy;
      let t = lenSq === 0 ? 0 : ((px - ax) * dx + (py - ay) * dy) / lenSq;
      t = Math.max(0, Math.min(1, t));
      const cpx = ax + t * dx, cpy = ay + t * dy;
      const distX = px - cpx, distY = py - cpy;
      const dist = Math.sqrt(distX * distX + distY * distY);
      if (dist < bestDist) {
        bestDist = dist;
        bestX = cpx;
        bestY = cpy;
        // Normal perpendicular to this segment
        const len = Math.sqrt(lenSq);
        if (len > 0) {
          bestNx = -dy / len;
          bestNy = dx / len;
        }
      }
    }
    return { dist: bestDist, x: bestX, y: bestY, nx: bestNx, ny: bestNy };
  }

  function showImpact(x, y) {
    impactFlash.style.left = (x - 25) + 'px';
    impactFlash.style.top = (y - 25) + 'px';
    impactFlash.style.opacity = '1';
    impactFlash.style.transform = 'scale(1)';
    impactFlash.style.transition = 'none';
    requestAnimationFrame(() => {
      impactFlash.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
      impactFlash.style.opacity = '0';
      impactFlash.style.transform = 'scale(4)';
    });
  }

  let lastImpactX = cx, lastImpactY = cy;

  function updateBall() {
    frameCount++;
    sceneTime++;
    const t = frameCount * turbulenceSpeed;

    // Light turbulence for organic feel
    ballVX += noise(t) * 0.04 + driftX;
    ballVY += noise(t + 500) * 0.03 + driftY;

    // === MAGNETIC ATTRACTION (disabled during drops) ===
    if (!dropping) {
      const MAGNET_STRENGTH = 0.08;
      let closestBarrier = -1, closestDist = Infinity;
      for (let i = 0; i < chevronSegments.length; i++) {
        const result = closestOnCurve(chevronSegments[i], ballX, ballY);
        if (result.dist < closestDist) {
          closestDist = result.dist;
          closestBarrier = i;
        }
      }
      const targetBarrier = 1 - closestBarrier;
      const target = closestOnCurve(chevronSegments[targetBarrier], ballX, ballY);
      if (target.dist > COLLISION_DIST) {
        const dx = target.x - ballX;
        const dy = target.y - ballY;
        const dist = target.dist;
        const force = MAGNET_STRENGTH * Math.min(1, dist / 150);
        ballVX += (dx / dist) * force;
        ballVY += (dy / dist) * force;
      }
    }

    // Normal gravity — ball has real weight
    ballVY += GRAVITY;

    // Gentle vertical centering (disabled during drops)
    if (!dropping) {
      const dyFromCenter = ballY - cy;
      if (dyFromCenter > 80) {
        ballVY -= dyFromCenter * 0.003;
      }
    }

    // === OCCASIONAL DROP: ball falls down between the barriers — each drop is unique ===
    if (!dropping && sceneTime >= dropTimer) {
      dropping = true;
      dropDuration = 50 + Math.floor(Math.random() * 70);
      // Randomize the drop style each time
      dropStyle = Math.random();
      dropSeed = Math.random() * 1000;
      dropGravMult = 2.5 + Math.random() * 3.0; // varying heaviness
      dropDrift = (Math.random() - 0.5) * 0.12; // lateral drift during fall
      // Gentle transition into drop — reduce horizontal, add downward
      ballVX *= 0.3 + Math.random() * 0.3;
      ballVY = Math.max(ballVY, 1.5 + Math.random() * 2.5);
    }
    if (dropping) {
      const dropT = (dropDuration < 80) ? (80 - dropDuration) / 80 : 0;
      // Eased gravity ramp — starts gentle, gets heavier
      const easedGrav = GRAVITY * dropGravMult * (0.3 + 0.7 * dropT);
      ballVY += easedGrav;
      // Unique lateral wobble per drop
      const wobble = Math.sin(dropSeed + sceneTime * 0.07) * 0.15
                   + Math.sin(dropSeed * 1.7 + sceneTime * 0.13) * 0.08;
      ballVX += wobble + dropDrift;
      // Soft center pull so it stays between barriers
      const dxToCenter = cx - ballX;
      ballVX += dxToCenter * 0.004;
      ballVX *= 0.98;
      dropDuration--;
      if (dropDuration <= 0) {
        dropping = false;
        dropTimer = sceneTime + 180 + Math.floor(Math.random() * 280);
      }
    }

    // Speed cap
    const spd = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
    const maxSpd = dropping ? 12 : 8;
    if (spd > maxSpd) { const s = maxSpd / spd; ballVX *= s; ballVY *= s; }

    // Light damping — keeps energy but prevents runaway
    ballVX *= 0.995;
    ballVY *= 0.995;

    ballX += ballVX;
    ballY += ballVY;

    // Collision with curved chevrons
    let hitThisFrame = false;
    for (let i = 0; i < chevronSegments.length; i++) {
      const result = closestOnCurve(chevronSegments[i], ballX, ballY);
      if (result.dist < COLLISION_DIST) {
        let { nx, ny, x: cpx, y: cpy } = result;
        const distX = ballX - cpx, distY = ballY - cpy;
        const dot = nx * distX + ny * distY;
        if (dot < 0) { nx = -nx; ny = -ny; }

        const velDot = ballVX * nx + ballVY * ny;
        if (velDot < 0) {
          // Reflect
          ballVX -= 2 * velDot * nx;
          ballVY -= 2 * velDot * ny;
          // Repulse
          ballVX += nx * REPULSE_FORCE;
          ballVY += ny * REPULSE_FORCE;
          // Push out
          const overlap = COLLISION_DIST - result.dist;
          ballX += nx * (overlap + 3);
          ballY += ny * (overlap + 3);
          // Random deflection
          const deflect = (Math.random() - 0.5) * 0.4;
          const cosD = Math.cos(deflect), sinD = Math.sin(deflect);
          const nvx = ballVX * cosD - ballVY * sinD;
          const nvy = ballVX * sinD + ballVY * cosD;
          ballVX = nvx;
          ballVY = nvy;

          // If dropping and we hit a barrier, end the drop
          if (dropping) {
            dropping = false;
            dropTimer = sceneTime + 250 + Math.floor(Math.random() * 250);
          }

          chevronHit[i] = 1.0;
          chevronImpactX[i] = cpx;
          chevronImpactY[i] = cpy;
          lastImpactX = cpx;
          lastImpactY = cpy;
          hitThisFrame = true;

          showImpact(cpx, cpy);
          onCollisionBumpStats();
        }
      }
    }

    // Dot: appears on contact, fades away
    if (hitThisFrame) {
      dotOpacity = 1.0;
    } else {
      dotOpacity *= 0.94;
    }

    // Keep ball in frame — hard boundaries
    if (ballX < ballRadius) { ballX = ballRadius; ballVX = Math.abs(ballVX) * 0.6; }
    if (ballX > W - ballRadius) { ballX = W - ballRadius; ballVX = -Math.abs(ballVX) * 0.6; }
    if (ballY < 280) { ballY = 280; ballVY = Math.abs(ballVY) * 0.6; }
    if (ballY > H - ballRadius - 30) { ballY = H - ballRadius - 30; ballVY = -Math.abs(ballVY) * 0.5; }

    // === SMOOTH DISPLAY POSITION (interpolated for fluid rendering) ===
    displayX += (ballX - displayX) * 0.4;
    displayY += (ballY - displayY) * 0.4;

    // Update DOM with smoothed position
    floatingAvatar.style.left = (displayX - 28) + 'px';
    floatingAvatar.style.top = (displayY - 28) + 'px';

    // Dot appears at impact point, stays there and fades
    dotTrail.style.left = (lastImpactX - 6) + 'px';
    dotTrail.style.top = (lastImpactY - 6) + 'px';
    dotTrail.style.opacity = dotOpacity < 0.02 ? '0' : dotOpacity.toString();
  }

  // Ensure canvas pixel size matches its CSS display size
  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    if (canvas.width !== rect.width || canvas.height !== rect.height) {
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
  }
  resizeCanvas();

    updateBall();
    drawNeonX();
    requestAnimationFrame(animate);
  }

  let currentProfile = 0;

  // Current displayed stat values — increment on each collision
  let currentFollowing = 0, currentFollowers = 0, currentLikes = 0;
  let targetFollowing = 0, targetFollowers = 0, targetLikes = 0;
  let totalCollisions = 0, maxCollisionsPerScene = 0;

  function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
    if (num >= 1000) return (num / 1000).toFixed(1) + "K";
    return num.toString();
  }

  function animateValue(el, start, end, duration) {
    const startTime = performance.now();
    function update(currentTime) {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = Math.round(start + (end - start) * eased);
      el.textContent = formatNumber(current);
      if (progress < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  }

  // Called on each ball-barrier collision to bump stats
  function onCollisionBumpStats() {
    totalCollisions++;
    const p = profiles[(currentProfile - 1 + profiles.length) % profiles.length];

    // Remaining gap — how much is left to grow
    const remFollowing = p.following.end - currentFollowing;
    const remFollowers = p.followers.end - currentFollowers;
    const remLikes = p.likes.end - currentLikes;

    // If everything is maxed, nothing to do
    if (remFollowing <= 0 && remFollowers <= 0 && remLikes <= 0) return;

    // Each collision adds a big chunk of the REMAINING gap — fast visible jump
    const bumpFrac = 0.2 + Math.random() * 0.25;

    const prevFollowing = currentFollowing;
    const prevFollowers = currentFollowers;
    const prevLikes = currentLikes;

    currentFollowing = Math.min(p.following.end, currentFollowing + Math.max(1, Math.round(remFollowing * bumpFrac)));
    currentFollowers = Math.min(p.followers.end, currentFollowers + Math.max(1, Math.round(remFollowers * bumpFrac)));
    currentLikes = Math.min(p.likes.end, currentLikes + Math.max(1, Math.round(remLikes * bumpFrac)));

    // Animate quickly — 200ms snap
    animateValue(document.getElementById("following"), prevFollowing, currentFollowing, 200);
    animateValue(document.getElementById("followers"), prevFollowers, currentFollowers, 200);
    animateValue(document.getElementById("likes"), prevLikes, currentLikes, 200);
  }

  function showProfile(index) {
    const p = profiles[index];
    const card = document.getElementById("profileCard");
    const emoji = document.getElementById("emojiReaction");

    // Reset ball to center with new random trajectory
    resetBallToCenter();

    // === Step 0: If emoji is visible, animate it out first ===
    const emojiVisible = emoji.style.display === "block";
    let emojiDelay = 0;
    if (emojiVisible) {
      emoji.style.animation = "none";
      void emoji.offsetWidth;
      emoji.style.animation = "emojiPopOut 0.5s ease-in forwards";
      emojiDelay = 500; // wait for emoji to fully disappear
    }

    setTimeout(() => {
      // Hide emoji completely after pop-out
      if (emojiVisible) {
        emoji.style.display = "none";
        emoji.style.animation = "none";
      }

      // === Step 1: Smooth slide OUT (up + fade) ===
      card.classList.add("slide-out");
      card.classList.remove("slide-in");

      // Show/hide background video based on profile
      const bgVideo = document.getElementById("bgVideo");
      if (p.video) {
        if (bgVideo.getAttribute("src") !== p.video) {
          bgVideo.src = p.video;
        }
        activeVideoStart = p.videoStart || 0;
        bgVideo.currentTime = activeVideoStart;
        activeVideoLimit = p.videoLimit || 5;
        bgVideo.style.opacity = "1";
        bgVideo.play().catch(() => {});
      } else {
        bgVideo.style.opacity = "0";
        bgVideo.pause();
      }

      // === Step 2: After slide-out completes, swap content ===
      setTimeout(() => {
        const avatarEl = document.getElementById("avatar");
        const floatEl = document.getElementById("floatingAvatar");
        if (p.image) {
          avatarEl.textContent = "";
          avatarEl.style.background = "none";
          avatarEl.style.backgroundImage = `url(${p.image})`;
          avatarEl.style.backgroundSize = "cover";
          avatarEl.style.backgroundPosition = "center";
          floatEl.textContent = "";
          floatEl.style.background = "none";
          floatEl.style.backgroundImage = `url(${p.image})`;
          floatEl.style.backgroundSize = "cover";
          floatEl.style.backgroundPosition = "center";
        } else {
          avatarEl.textContent = p.initials;
          avatarEl.style.backgroundImage = "none";
          avatarEl.style.background = p.color;
          floatEl.textContent = p.initials;
          floatEl.style.backgroundImage = "none";
          floatEl.style.background = p.color;
        }
        document.getElementById("username").textContent = p.name;

        // Set stats to start values — they'll increase on collisions
        currentFollowing = p.following.start;
        currentFollowers = p.followers.start;
        currentLikes = p.likes.start;
        totalCollisions = 0;
        document.getElementById("following").textContent = formatNumber(currentFollowing);
        document.getElementById("followers").textContent = formatNumber(currentFollowers);
        document.getElementById("likes").textContent = formatNumber(currentLikes);

        if (p.emoji) {
          emoji.textContent = p.emoji;
          emoji.style.display = "block";
          emoji.style.animation = "none";
          void emoji.offsetWidth;
          emoji.style.animation = "emojiPop 0.5s ease-out";
        }

        // === Step 3: Smooth slide IN (down + fade in) ===
        requestAnimationFrame(() => {
          card.classList.remove("slide-out");
          card.classList.add("slide-in");
        });
      }, 550); // wait for the 0.5s slide-out transition to finish
    }, emojiDelay); // wait for emoji pop-out if needed
  }

  function cycleProfiles() {
    showProfile(currentProfile);
    currentProfile = (currentProfile + 1) % profiles.length;
  }

  // Initialize first profile stats
  currentFollowing = profiles[0].following.start;
  currentFollowers = profiles[0].followers.start;
  currentLikes = profiles[0].likes.start;

  // === Background video: loop within per-profile time range ===
  let activeVideoStart = profiles[0].videoStart || 0;
  let activeVideoLimit = profiles[0].videoLimit || 5;
  const bgVideo = document.getElementById("bgVideo");
  bgVideo.addEventListener('timeupdate', () => {
    if (bgVideo.currentTime >= activeVideoLimit) {
      bgVideo.currentTime = activeVideoStart;
    }
  });
  // Start playing
  bgVideo.currentTime = 0;
  bgVideo.play().catch(() => {});

  // Cycle profiles
  currentProfile = 1;
  setInterval(cycleProfiles, 5000);
</script>

</body>
</html>
